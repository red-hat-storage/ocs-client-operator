apiVersion: v1
kind: Service
metadata:
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: ocs-client-metrics-cert-secret
  labels:
    app: ocs-client-operator
    server: metrics
  # olm prepends ocs-client-operator- as a prefix
  name: metrics
  namespace: system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
  selector:
    app: ocs-client-operator
