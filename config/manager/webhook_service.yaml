apiVersion: v1
kind: Service
metadata:
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: ocs-client-webhook-cert-secret
  labels:
    app: ocs-client-operator
    server: webhook
  name: webhook-server
  namespace: system
# should be in sync with pkg/templates/webhookservice.go
spec:
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: 7443
  selector:
    app: ocs-client-operator
  type: ClusterIP
