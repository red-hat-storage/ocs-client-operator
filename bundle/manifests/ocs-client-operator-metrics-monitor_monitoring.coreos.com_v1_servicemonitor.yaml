apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ocs-client-operator-metrics-monitor
spec:
  endpoints:
  - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    path: /metrics
    port: https
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
  selector:
    matchLabels:
      app: ocs-client-operator
      server: metrics
