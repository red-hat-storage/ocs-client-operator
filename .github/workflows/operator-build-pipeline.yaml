---
name: operator-build-pipeline
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
    branches: ['*']

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
            go-version-file: go.mod
            cache: false
      - name: Source build env variables
        run: |
          grep -v '^#' hack/build.env >> $GITHUB_ENV
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a
        with:
          version: ${{ env.GO_LINT_IMG_TAG }}
          args: --config=.golangci.yaml -v
  container-build:
    name: operator-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
            go-version-file: go.mod
            cache: false
      - name: Build operator container image
        run: make build
  bundle-build:
    name: bundle-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
            go-version-file: go.mod
            cache: false
      - name: Build operator bundle container image
        run: make bundle-build
  catalog-build:
    name: catalog-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
            go-version-file: go.mod
            cache: false
      - name: Build catalog container image
        env:
          IMAGE_REGISTRY: localhost:5000
        run: |
          docker run -d -p 5000:5000 --name registry registry:2
          make bundle-build bundle-push catalog-build
